spring.datasource.url=jdbc:h2:mem:bidmart_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.open-in-view=false

app.auth.access-token-ttl=PT15M
app.auth.refresh-token-ttl=P30D
app.auth.jwt-issuer=bidmart-auth-test
app.auth.jwt-access-secret=test-secret-at-least-32-characters-long
app.auth.refresh-rotation-enabled=true
app.auth.refresh-reuse-detection-enabled=true
app.auth.max-concurrent-sessions=3
app.auth.concurrent-session-policy=REVOKE_OLDEST
app.auth.login-attempt-limit=5
app.auth.login-attempt-window=PT15M
app.auth.otp-attempt-limit=5
