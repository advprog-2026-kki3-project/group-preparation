spring.application.name=bidmart

# PostgreSQL baseline for the auth module (override via env vars per environment)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bidmart}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.open-in-view=false

# Mail baseline for email OTP flow
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

# Authentication baseline settings
app.auth.access-token-ttl=PT15M
app.auth.refresh-token-ttl=P30D
app.auth.jwt-issuer=${AUTH_JWT_ISSUER:bidmart-auth}
app.auth.jwt-access-secret=${AUTH_JWT_ACCESS_SECRET:replace-this-with-at-least-32-char-secret-key}
app.auth.refresh-rotation-enabled=true
app.auth.refresh-reuse-detection-enabled=true
app.auth.max-concurrent-sessions=3
app.auth.concurrent-session-policy=REVOKE_OLDEST
app.auth.login-attempt-limit=5
app.auth.login-attempt-window=PT15M
app.auth.otp-attempt-limit=5
