spring.application.name=bidmart

# DATABASE CONFIGURATION (PostgreSQL for Local & Heroku)
spring.datasource.url=${JDBC_DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/bidmart}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${DB_PASSWORD:p3Y5AB9N}}

spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# FLYWAY & HIBERNATE MIGRATIONS
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate

# AUTHENTICATION & JWT SETTINGS
app.auth.access-token-ttl=PT15M
app.auth.refresh-token-ttl=P30D
app.auth.jwt-issuer=${AUTH_JWT_ISSUER:bidmart-auth}
app.auth.jwt-access-secret=${AUTH_JWT_ACCESS_SECRET:replace-this-with-at-least-32-char-secret-key}
app.auth.refresh-rotation-enabled=true
app.auth.refresh-reuse-detection-enabled=true
app.auth.max-concurrent-sessions=3
app.auth.concurrent-session-policy=REVOKE_OLDEST
app.auth.login-attempt-limit=5
app.auth.login-attempt-window=PT15M
app.auth.otp-attempt-limit=5
app.auth.otp-ttl=PT5M

# EMAIL & OTP SETTINGS
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:bidmart.project.int@gmail.com}
spring.mail.password=${MAIL_PASSWORD:auvh wvle eqvq ifqj}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:30000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:30000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:30000}

# MONITORING
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

# NOTIFICATIONS
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method