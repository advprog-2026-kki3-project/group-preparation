<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BidMart - Group Preparation</title>
</head>
<body>

<h1>Welcome to BidMart!</h1>
<p>This page demonstrates full-stack integration.</p>

<h2>Current Auction Items:</h2>

<ul>
    <li th:each="listing : ${listings}">
        <strong th:text="${listing.title}"></strong><br>
        Description: <span th:text="${listing.description}"></span><br>
        Current Price: <span th:text="${listing.currentPrice}"></span>
    </li>
</ul>

</body>
</html>
