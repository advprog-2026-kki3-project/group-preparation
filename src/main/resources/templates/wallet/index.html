<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Wallet - BidMart</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 40px;">
<h1>Wallet Management</h1>

<div style="border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 350px;">
    <h3>Available Balance: Rp <span th:text="${wallet.availableBalance}">0</span></h3>
    <h3 style="color: gray;">Held Balance (Active Bids): Rp <span th:text="${wallet.heldBalance}">0</span></h3>
</div>

<h3 style="margin-top: 30px;">Top Up Wallet</h3>
<form th:action="@{/wallet/topup}" method="post">
    <label for="amount">Amount (Rp):</label>
    <input type="number" id="amount" name="amount" min="1000" step="1000" required>
    <button type="submit" style="margin-left: 10px; padding: 5px 15px;">Deposit</button>
</form>

<h3 style="margin-top: 30px;">Transaction History</h3>
<ul>
    <li th:each="tx : ${history}">
        <strong th:text="${tx.transactionType}">TYPE</strong> -
        Rp <span th:text="${tx.amount}">0</span>
        <em style="color: gray; font-size: 0.8em;" th:text="${tx.timestamp}">Date</em>
    </li>
</ul>

<br><br>
<a href="/">← Back to Home</a>
</body>
</html>
